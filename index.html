<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生日快乐 元子</title>

<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'ZCOOL KuaiLe', cursive;
  background:#000 url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwMCIgaGVpZ2h0PSIyMDAwIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPgogIDxjaXJjbGUgY3g9IjEwMDAiIGN5PSIxMDAwIiByPSI5OTAiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2ZmZiIgc3Ryb2tlLXdpZHRoPSIyIiBmaWxsLW9wYWNpdHk9IjAuMSIvPgogIDxwYXRoIGQ9Ik0wIDBoMjAwMHYyMDAwaC0yMDAweiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjEiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPgogIDxwYXRoIGQ9Ik0xMDAwIDEwMDBjLTU1MiAwLTEwMDAgNDQ4LTEwMDAgMTAwMFM0NDggMzAwMCAxMDAwIDMwMDBzMTAwMC00NDggMTAwMC0xMDAwUzE1NTIgMTAwMCAxMDAwIDEwMDB6IiBmaWxsPSJub25lIiBzdHJva2U9IiNmZmYiIHN0cm9rZS13aWR0aD0iMSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+Cjwvc3ZnPg==') repeat;
  color:white;
  text-align:center;
  -webkit-user-select: none;
  user-select: none;
}

/* 彻底移除canvas，改用静态背景图 */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:10;
  width:90%;
}

#cake{
  font-size:70px;
  margin-bottom:10px;
  animation:float 3s infinite ease-in-out;
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

#candle{
  position:relative;
  font-size:40px;
  margin-bottom:20px;
}
.flame{
  width:14px;
  height:26px;
  background:radial-gradient(circle,#ffd54f,#ff6f00);
  border-radius:50%;
  position:absolute;
  left:50%;
  top:-28px;
  transform:translateX(-50%);
  animation:flicker .15s infinite;
}
@keyframes flicker{
  0%{transform:translateX(-50%) scale(1)}
  50%{transform:translateX(-50%) scale(1.2)}
  100%{transform:translateX(-50%) scale(1)}
}

h1{
  font-size:28px;
  margin-bottom:10px;
  line-height:1.3;
}
.subtitle{
  opacity:0.9;
  margin-bottom:20px;
  font-size:16px;
}

button{
  padding:14px 28px;
  font-size:18px;
  border:none;
  border-radius:40px;
  background:white;
  color:#ff4d6d;
  box-shadow:0 8px 25px rgba(0,0,0,0.25);
  min-width:140px;
  -webkit-tap-highlight-color:transparent;
}
button:active{
  transform:scale(0.9);
}

#message{
  margin-top:20px;
  font-size:18px;
  line-height:1.7;
  min-height:120px;
  white-space:pre-line;
  padding:0 10px;
}

#manualBlow{
  margin-top:10px;
}
#manualBlow button{
  padding:10px 20px;
  font-size:16px;
  background:#ff4d6d;
  color:white;
}

#letter{
  position:absolute;
  bottom:-100%;
  width:75%;
  max-width:320px;
  background:white;
  color:#333;
  border-radius:20px;
  padding:25px;
  font-size:18px;
  line-height:1.7;
  transition:1.2s;
  box-sizing:border-box;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

#fireworks-text{
  display: none;
}
</style>
</head>
<body>

<div class="container" id="main">
  <div id="cake">🎂</div>
  <div id="candle">🕯️<div class="flame" id="flame"></div></div>
  <h1>元子生日快乐</h1>
  <div class="subtitle">小心！有人准备一展烂歌喉</div>
  <button onclick="start()">点一下</button>
  <div id="message"></div>
  <div id="manualBlow" style="display:none;">
    <button onclick="blowCandle()">👉 手动吹蜡烛</button>
  </div>
</div>

<div id="letter">
生日快乐。  

愿你这一年  
以及永永远远  
幸福快乐  

乐莫乐兮心相知  

❤️
</div>

<div id="fireworks-text">生日快乐 元子</div>

<audio id="song" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
// 全局音频（PC + 手机都能用）
const song = document.getElementById('song');

// 手机音频解锁
document.addEventListener('click', function() {
  if (song.paused) {
    song.play().catch(e => {});
  }
}, { once: true });

// ========== 主逻辑（完全移除所有canvas渲染） ==========
function start() {
  document.querySelector("button").style.display = "none";

  // 播放音频
  try { song.pause(); song.currentTime = 0; song.play(); } catch (e) {}

  // 开始打字动画
  typeText();
}

// ========== 打字动画 ==========
let text = "\n❤️愿卿此日生双翼\n质本洁来还洁去\n自由勇敢\n幸福做自己\n\n请吹灭蜡烛 🎂";
let i = 0;
function typeText() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 80);
  } else {
    document.getElementById("manualBlow").style.display = "block";
    startMic();
  }
}

// ========== 麦克风吹蜡烛（极简版） ==========
function startMic() {
  if (!navigator.mediaDevices) return;
  
  // 降低麦克风检测的性能消耗
  navigator.mediaDevices.getUserMedia({audio: true})
  .then(stream => {
    const ac = new AudioContext();
    const mic = ac.createMediaStreamSource(stream);
    const an = ac.createAnalyser();
    mic.connect(an);
    an.fftSize = 32; // 最小FFT尺寸，减少计算
    const d = new Uint8Array(an.frequencyBinCount);
    
    // 每100ms检测一次（进一步降低频率）
    let lastCheck = 0;
    function detect(timestamp) {
      if (timestamp - lastCheck > 100) {
        an.getByteFrequencyData(d);
        const v = d.reduce((a, b) => a + b) / d.length;
        if (v > 50) { // 提高阈值，减少误触发
          blowCandle();
        }
        lastCheck = timestamp;
      }
      requestAnimationFrame(detect);
    }
    detect(0);
  }).catch(() => {});
}

// ========== 吹灭蜡烛 ==========
function blowCandle() {
  if (document.getElementById("flame").style.display === "none") return;
  
  document.getElementById("flame").style.display = "none";
  document.getElementById("message").innerHTML += "\n\n愿望会实现的 ✨";
  document.getElementById("manualBlow").style.display = "none";
  showLetter();
}

// ========== 信封出现 ==========
function showLetter() {
  setTimeout(() => {
    document.getElementById("letter").style.bottom = "20px";
  }, 1500);
}
</script>
</body>
</html>
