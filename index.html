<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生日快乐 元子</title>

<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'ZCOOL KuaiLe', cursive;
  background:black;
  color:white;
  text-align:center;
  -webkit-user-select: none;
  user-select: none;
}

/* 仅保留星空画布 */
#skyCanvas{
  position:fixed;
  top:0;
  left:0;
  z-index:1;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:10;
  width:90%;
}

#cake{
  font-size:70px;
  margin-bottom:10px;
  animation:float 3s infinite ease-in-out;
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

#candle{
  position:relative;
  font-size:40px;
  margin-bottom:20px;
}
.flame{
  width:14px;
  height:26px;
  background:radial-gradient(circle,#ffd54f,#ff6f00);
  border-radius:50%;
  position:absolute;
  left:50%;
  top:-28px;
  transform:translateX(-50%);
  animation:flicker .15s infinite;
}
@keyframes flicker{
  0%{transform:translateX(-50%) scale(1)}
  50%{transform:translateX(-50%) scale(1.2)}
  100%{transform:translateX(-50%) scale(1)}
}

h1{
  font-size:28px;
  margin-bottom:10px;
  line-height:1.3;
}
.subtitle{
  opacity:0.9;
  margin-bottom:20px;
  font-size:16px;
}

button{
  padding:14px 28px;
  font-size:18px;
  border:none;
  border-radius:40px;
  background:white;
  color:#ff4d6d;
  box-shadow:0 8px 25px rgba(0,0,0,0.25);
  min-width:140px;
  -webkit-tap-highlight-color:transparent;
}
button:active{
  transform:scale(0.9);
}

#message{
  margin-top:20px;
  font-size:18px;
  line-height:1.7;
  min-height:120px;
  white-space:pre-line;
  padding:0 10px;
}

#manualBlow{
  margin-top:10px;
}
#manualBlow button{
  padding:10px 20px;
  font-size:16px;
  background:#ff4d6d;
  color:white;
}

#letter{
  position:absolute;
  bottom:-100%;
  width:75%;
  max-width:320px;
  background:white;
  color:#333;
  border-radius:20px;
  padding:25px;
  font-size:18px;
  line-height:1.7;
  transition:1.2s;
  box-sizing:border-box;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

/* 移除烟花文字样式（保留文字，仅隐藏） */
#fireworks-text{
  display: none;
}
</style>
</head>
<body>

<!-- 仅保留星空画布 -->
<canvas id="skyCanvas"></canvas>

<div class="container" id="main">
  <div id="cake">🎂</div>
  <div id="candle">🕯️<div class="flame" id="flame"></div></div>
  <h1>元子生日快乐</h1>
  <div class="subtitle">小心！有人准备一展烂歌喉</div>
  <button onclick="start()">点一下</button>
  <div id="message"></div>
  <div id="manualBlow" style="display:none;">
    <button onclick="blowCandle()">👉 手动吹蜡烛</button>
  </div>
</div>

<div id="letter">
生日快乐。  

愿你这一年  
以及永永远远  
幸福快乐  

乐莫乐兮心相知  

❤️
</div>

<!-- 烟花文字节点保留但隐藏 -->
<div id="fireworks-text">生日快乐 元子</div>

<audio id="song" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
// 全局音频（PC + 手机都能用）
const song = document.getElementById('song');

// 手机音频解锁
document.addEventListener('click', function() {
  if (song.paused) {
    song.play().catch(e => {});
  }
}, { once: true });

// ========== 仅保留星空+流星效果（优化版） ==========
const canvas = document.getElementById("skyCanvas");
const ctx = canvas.getContext("2d");

// 适配屏幕
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 星空参数（轻量化）
const STAR_COUNT = 80;    // 星星数量
const METEOR_INTERVAL = 5000; // 流星发射间隔

// 数据结构
let stars = [];
let meteors = [];

// 初始化星星
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.2,
    a: Math.random() * 0.8 + 0.2,
    speed: Math.random() * 0.02 + 0.01
  });
}

// 发射流星
function launchMeteor() {
  meteors.push({
    x: Math.random() * canvas.width,
    y: 0,
    dx: Math.random() * 60 + 30,
    dy: Math.random() * 20 + 10,
    vx: 3 + Math.random() * 1,
    vy: 1.5 + Math.random() * 0.5,
    a: 1
  });
}
setInterval(launchMeteor, METEOR_INTERVAL);

// 渲染星空+流星
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 绘制星星
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
    s.a += s.speed * (Math.random() > 0.5 ? 1 : -1);
    s.a = Math.max(0.2, Math.min(0.8, s.a));
  });

  // 绘制流星
  meteors.forEach(m => {
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x + m.dx, m.y + m.dy);
    ctx.strokeStyle = `rgba(255,255,255,${m.a})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    m.x += m.vx;
    m.y += m.vy;
    m.a -= 0.015;
  });

  // 清理无效流星
  meteors = meteors.filter(m => m.a > 0);

  requestAnimationFrame(render);
}
render();

// ========== 主逻辑（移除所有烟花相关代码） ==========
function start() {
  document.querySelector("button").style.display = "none";

  // 播放音频
  try { song.pause(); song.currentTime = 0; song.play(); } catch (e) {}

  // 开始打字动画
  typeText();
  
  // 移除烟花定时发射逻辑
  // 移除烟花文字显示逻辑
}

// ========== 打字动画 ==========
let text = "\n❤️愿卿此日生双翼\n质本洁来还洁去\n自由勇敢\n幸福做自己\n\n请吹灭蜡烛 🎂";
let i = 0;
function typeText() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 80);
  } else {
    document.getElementById("manualBlow").style.display = "block";
    startMic();
  }
}

// ========== 麦克风吹蜡烛 ==========
function startMic() {
  if (!navigator.mediaDevices) return;
  navigator.mediaDevices.getUserMedia({ audio: true })
  .then(stream => {
    const ac = new AudioContext();
    const mic = ac.createMediaStreamSource(stream);
    const an = ac.createAnalyser();
    mic.connect(an);
    const d = new Uint8Array(an.frequencyBinCount);
    
    let lastCheck = 0;
    function detect(timestamp) {
      if (timestamp - lastCheck > 50) {
        an.getByteFrequencyData(d);
        const v = d.reduce((a, b) => a + b) / d.length;
        if (v > 40) blowCandle();
        lastCheck = timestamp;
      }
      requestAnimationFrame(detect);
    }
    detect(0);
  }).catch(() => {});
}

// ========== 吹灭蜡烛 ==========
function blowCandle() {
  if (document.getElementById("flame").style.display === "none") return;
  
  document.getElementById("flame").style.display = "none";
  document.getElementById("message").innerHTML += "\n\n愿望会实现的 ✨";
  document.getElementById("manualBlow").style.display = "none";
  showLetter();
}

// ========== 信封出现 ==========
function showLetter() {
  setTimeout(() => {
    document.getElementById("letter").style.bottom = "20px";
  }, 1500);
}
</script>
</body>
</html>
