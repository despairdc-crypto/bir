<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生日快乐 元子</title>

<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'ZCOOL KuaiLe', cursive;
  background:
  radial-gradient(circle at top, #fff5f8 0%, #ffe4ef 45%, #ffd8e8 100%);
  color:#ff6b9d;
  text-align:center;
  -webkit-user-select:none;
  user-select:none;
}

/* 漂浮背景光点 */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle, rgba(255,255,255,0.5) 2px, transparent 3px);
  background-size:60px 60px;
  animation:movebg 30s linear infinite;
  opacity:.4;
}

@keyframes movebg{
  from{transform:translate(0,0)}
  to{transform:translate(-100px,-100px)}
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(.9);
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:10;
  width:88%;
  max-width:380px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(12px);
  padding:24px;
  border-radius:28px;
  box-shadow:
    0 12px 40px rgba(255,107,157,0.18),
    inset 0 0 20px rgba(255,255,255,0.5);
  animation:cardIn 1.2s ease forwards;
}

@keyframes cardIn{
  to{
    transform:translate(-50%,-50%) scale(1);
  }
}

#cake{
  font-size:82px;
  margin-bottom:10px;
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-14px)}
  100%{transform:translateY(0)}
}

#candle{
  position:relative;
  font-size:50px;
  margin-bottom:20px;
}

.flame{
  width:16px;
  height:28px;
  background:radial-gradient(circle,#fff4a8 0%, #ffd066 60%, #ff9d3f 100%);
  border-radius:50%;
  position:absolute;
  left:50%;
  top:-30px;
  transform:translateX(-50%);
  animation:flicker .12s infinite;
  box-shadow:
    0 0 12px rgba(255,208,102,.9),
    0 0 25px rgba(255,180,80,.5);
}

@keyframes flicker{
  0%{transform:translateX(-50%) scale(1)}
  50%{transform:translateX(-50%) scale(1.22)}
  100%{transform:translateX(-50%) scale(1)}
}

h1{
  font-size:32px;
  margin-bottom:10px;
  line-height:1.3;
}

.subtitle{
  opacity:.9;
  margin-bottom:20px;
  font-size:18px;
}

button{
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,#ff7ea6,#ff5e8f);
  color:white;
  box-shadow:0 10px 25px rgba(255,107,157,.3);
  min-width:150px;
  transition:.25s;
}

button:active{
  transform:scale(.93);
}

#message{
  margin-top:20px;
  font-size:18px;
  line-height:1.7;
  min-height:120px;
  white-space:pre-line;
}

#manualBlow{
  margin-top:10px;
}

#manualBlow button{
  padding:10px 20px;
  font-size:16px;
}

#letter{
  position:absolute;
  bottom:-100%;
  width:78%;
  max-width:320px;
  background:white;
  color:#ff6b9d;
  border-radius:22px;
  padding:24px;
  font-size:18px;
  line-height:1.8;
  transition:1.3s ease;
  box-sizing:border-box;
  box-shadow:0 10px 35px rgba(255,107,157,.2);
}
</style>
</head>
<body>

<div class="container">
  <div id="cake">🎂</div>
  <div id="candle">🕯️<div class="flame" id="flame"></div></div>
  <h1>元子生日快乐</h1>
  <div class="subtitle">小心！有人准备一展烂歌喉</div>
  <button onclick="start()">点一下</button>
  <div id="message"></div>
  <div id="manualBlow" style="display:none;">
    <button onclick="blowCandle()">👉 手动吹蜡烛</button>
  </div>
</div>

<div id="letter">
生日快乐。  

愿你这一年  
以及永永远远  
幸福快乐  

乐莫乐兮心相知  

❤️
</div>

<audio id="song" preload="auto" playsinline webkit-playsinline>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const song=document.getElementById('song');

function start(){
  document.querySelector("button").style.display="none";

  song.play().then(()=>{
    typeText();
  }).catch(()=>{
    typeText();
  });
}

let text="\n❤️愿卿此日生双翼\n质本洁来还洁去\n自由勇敢\n幸福做自己\n\n请吹灭蜡烛 🎂";
let i=0;

function typeText(){
  if(i<text.length){
    document.getElementById("message").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typeText,80);
  }else{
    document.getElementById("manualBlow").style.display="block";
    startMic();
  }
}

function startMic(){
  if(!navigator.mediaDevices) return;

  navigator.mediaDevices.getUserMedia({audio:true})
  .then(stream=>{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const mic=ac.createMediaStreamSource(stream);
    const an=ac.createAnalyser();
    mic.connect(an);
    an.fftSize=32;
    const d=new Uint8Array(an.frequencyBinCount);

    function detect(){
      an.getByteFrequencyData(d);
      const v=d.reduce((a,b)=>a+b)/d.length;
      if(v>50){
        blowCandle();
      }
      requestAnimationFrame(detect);
    }

    detect();
  });
}

function blowCandle(){
  if(document.getElementById("flame").style.display==="none") return;

  document.getElementById("flame").style.display="none";
  document.getElementById("message").innerHTML+="\n\n愿望会实现的 ✨";
  document.getElementById("manualBlow").style.display="none";

  showLetter();
}

function showLetter(){
  setTimeout(()=>{
    document.getElementById("letter").style.bottom="30px";
  },1500);
}
</script>

</body>
</html>
