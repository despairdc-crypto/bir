<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生日快乐 元子</title>

<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'ZCOOL KuaiLe', cursive;
  background:black;
  color:white;
  text-align:center;
  -webkit-user-select: none;
  user-select: none;
}

canvas{
  position:fixed;
  top:0;
  left:0;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:10;
  width:90%;
}

#cake{
  font-size:70px;
  margin-bottom:10px;
  animation:float 3s infinite ease-in-out;
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

#candle{
  position:relative;
  font-size:40px;
  margin-bottom:20px;
}
.flame{
  width:14px;
  height:26px;
  background:radial-gradient(circle,#ffd54f,#ff6f00);
  border-radius:50%;
  position:absolute;
  left:50%;
  top:-28px;
  transform:translateX(-50%);
  animation:flicker .15s infinite;
}
@keyframes flicker{
  0%{transform:translateX(-50%) scale(1)}
  50%{transform:translateX(-50%) scale(1.2)}
  100%{transform:translateX(-50%) scale(1)}
}

h1{
  font-size:28px;
  margin-bottom:10px;
  line-height:1.3;
}
.subtitle{
  opacity:0.9;
  margin-bottom:20px;
  font-size:16px;
}

button{
  padding:14px 28px;
  font-size:18px;
  border:none;
  border-radius:40px;
  background:white;
  color:#ff4d6d;
  box-shadow:0 8px 25px rgba(0,0,0,0.25);
  min-width:140px;
  -webkit-tap-highlight-color:transparent;
}
button:active{
  transform:scale(0.9);
}

#message{
  margin-top:20px;
  font-size:18px;
  line-height:1.7;
  min-height:120px;
  white-space:pre-line;
  padding:0 10px;
}

#manualBlow{
  margin-top:10px;
}
#manualBlow button{
  padding:10px 20px;
  font-size:16px;
  background:#ff4d6d;
  color:white;
}

#letter{
  position:absolute;
  bottom:-100%;
  width:75%;
  max-width:320px;
  background:white;
  color:#333;
  border-radius:20px;
  padding:25px;
  font-size:18px;
  line-height:1.7;
  transition:1.2s;
  box-sizing:border-box;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

#fireworks-text{
  position:absolute;
  top:30%;
  left:50%;
  transform:translateX(-50%);
  font-size:36px;
  font-family:'ZCOOL KuaiLe', cursive;
  color:#ff4081;
  opacity:0;
  z-index:12;
  text-shadow:0 0 12px #fff,0 0 24px #ff4081;
  white-space:nowrap;
}
</style>
</head>
<body>

<canvas id="sky"></canvas>
<canvas id="fireworks"></canvas>

<div class="container" id="main">
  <div id="cake">🎂</div>
  <div id="candle">🕯️<div class="flame" id="flame"></div></div>
  <h1>元子生日快乐</h1>
  <div class="subtitle">小心！有人准备一展烂歌喉</div>
  <button onclick="start()">点一下</button>
  <div id="message"></div>
  <div id="manualBlow" style="display:none;">
    <button onclick="blowCandle()">👉 手动吹蜡烛</button>
  </div>
</div>

<div id="letter">
生日快乐。  

愿你这一年  
以及永永远远  
幸福快乐  

乐莫乐兮心相知  

❤️
</div>

<div id="fireworks-text">生日快乐 元子</div>

<audio id="song" loop>
  <source src="song.mp3" type="audio/mpeg">


<script>
// 全局音频（PC + 手机都能用）
const song = document.getElementById('song');

// 手机音频解锁
document.addEventListener('click', function() {
  if (song.paused) {
    song.play().catch(e => {});
  }
}, { once: true });

// 星空
const sky = document.getElementById("sky");
const ctx = sky.getContext("2d");
function resizeSky() {
  sky.width = window.innerWidth;
  sky.height = window.innerHeight;
}
resizeSky();
window.addEventListener('resize', resizeSky);

let stars = [], meteors = [];
for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * sky.width,
    y: Math.random() * sky.height,
    r: Math.random() * 1.5,
    a: Math.random()
  });
}

function drawStars() {
  ctx.clearRect(0, 0, sky.width, sky.height);
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255," + s.a + ")";
    ctx.fill();
    s.a += Math.random() * 0.05 - 0.02;
    if (s.a < 0) s.a = 0;
    if (s.a > 1) s.a = 1;
  });
  meteors.forEach(m => {
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x + m.dx, m.y + m.dy);
    ctx.strokeStyle = "rgba(255,255,255," + m.a + ")";
    ctx.lineWidth = 2;
    ctx.stroke();
    m.x += m.vx;
    m.y += m.vy;
    m.a -= 0.02;
  });
  meteors = meteors.filter(m => m.a > 0);
  requestAnimationFrame(drawStars);
}
drawStars();

function launchMeteor() {
  meteors.push({
    x: Math.random() * sky.width,
    y: 0,
    dx: Math.random() * 80 + 50,
    dy: Math.random() * 30 + 10,
    vx: 4 + Math.random() * 2,
    vy: 2 + Math.random() * 1,
    a: 1
  });
}
setInterval(launchMeteor, 3000);

// 烟花
const canvas = document.getElementById("fireworks");
const c = canvas.getContext("2d");
function resizeFire() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeFire();
window.addEventListener('resize', resizeFire);

let particles = [];

function explode(x, y, color) {
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 100, color: color
    });
  }
}

function drawFireworks() {
  c.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    ctx.beginPath();
    c.arc(p.x, p.y, 2, 0, Math.PI * 2);
    c.fillStyle = p.color;
    c.fill();
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
  requestAnimationFrame(drawFireworks);
}
drawFireworks();

function showFireworksText() {
  const txt = document.getElementById("fireworks-text");
  txt.style.opacity = 1;
  for (let i = 0; i < 3; i++) {
    explode(canvas.width / 2, canvas.height / 3, `hsl(${Math.random() * 360},100%,70%)`);
  }
  setTimeout(() => {
    txt.style.opacity = 0;
    txt.style.transition = "opacity 1s";
  }, 3000);
}

// 主逻辑
function start() {
  document.querySelector("button").style.display = "none";

  // 统一播放：PC + 手机都正常
  try { song.pause(); song.currentTime = 0; song.play(); } catch (e) {}

  typeText();
  setInterval(() => {
    explode(Math.random() * canvas.width, Math.random() * canvas.height / 2, `hsl(${Math.random() * 360},100%,70%)`);
  }, 1000);
  setTimeout(showFireworksText, 4000);
}

let text = "\n❤️愿卿此日生双翼\n质本洁来还洁去\n自由勇敢\n幸福做自己\n\n请吹灭蜡烛 🎂";
let i = 0;
function typeText() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 80);
  } else {
    document.getElementById("manualBlow").style.display = "block";
    startMic();
  }
}

function startMic() {
  if (!navigator.mediaDevices) return;
  navigator.mediaDevices.getUserMedia({ audio: true })
  .then(stream => {
    const ac = new AudioContext();
    const mic = ac.createMediaStreamSource(stream);
    const an = ac.createAnalyser();
    mic.connect(an);
    const d = new Uint8Array(an.frequencyBinCount);
    function detect() {
      an.getByteFrequencyData(d);
      const v = d.reduce((a, b) => a + b) / d.length;
      if (v > 40) blowCandle();
      requestAnimationFrame(detect);
    }
    detect();
  }).catch(() => {});
}

function blowCandle() {
  if (document.getElementById("flame").style.display === "none") return;
  document.getElementById("flame").style.display = "none";
  document.getElementById("message").innerHTML += "\n\n愿望会实现的 ✨";
  document.getElementById("manualBlow").style.display = "none";
  showLetter();
}

function showLetter() {
  setTimeout(() => {
    document.getElementById("letter").style.bottom = "20px";
  }, 1500);
}
</script>
</body>
</html>
